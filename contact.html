<!-- contact.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Link to Bootstrap CSS (local) -->
    <link href="./css/bootstrap.min.css" rel="stylesheet">

    <!-- Include your head section here (e.g., meta tags, title, stylesheets, etc.) -->
    <style>
        /* Custom CSS for the contact page */
        body {
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            color: #1e90ff;
            font-size: 3rem;
            margin-bottom: 30px;
        }

        p {
            font-size: 1.3rem;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .contact-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .form-label {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .form-control {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1.1rem;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #1e90ff;
        }

        .form-message {
            resize: vertical;
        }

        /* Custom CSS for the "Envoyer" button animation */
        .btn {
            background-color: #c16328;
            color: #fff;
            border-radius: 5px;
            padding: 12px 24px;
            font-size: 1.2rem;
            text-decoration: none;
            margin-top: 30px;
            display: inline-block;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn:hover {
            background-color: #ff6300;
            transform: translateY(-3px);
        }


        .cv-link {
            font-size: 1.1rem;
            margin-top: 20px;
        }

        /* Custom CSS for the CV link animation */
        .cv-link a {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #333;
            transition: transform 0.2s ease;
        }

        .cv-link a svg {
            margin-right: 5px;
        }

        .cv-link a:hover {
            transform: translateY(-3px);
        }

    </style>
</head>

<body>
<!-- Include a container for the navbar content -->
<div id="navbar-container"></div>

<main class="container">
    <!-- Content for your contact page goes here -->
    <h1>Contact</h1>
    <p>Vous pouvez me contacter en utilisant le formulaire ci-dessous.</p>

    <!-- Contact form -->
    <form class="contact-form">
        <div class="form-group">
            <label for="name" class="form-label">Nom</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="email" class="form-label">Adresse e-mail</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="message" class="form-label">Message</label>
            <textarea class="form-control form-message" id="message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Envoyer</button>
    </form>

    <!-- Link to download your CV (replace "cv.pdf" with your CV file name) -->
    <p class="cv-link">
        <a href="Cv.pdf" download>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-download">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path>
            </svg>
            Télécharger mon CV
        </a>
    </p>
</main>

<!-- Include a container for the footer content -->
<div id="footer-container"></div>

<!-- Link to Bootstrap JavaScript (local) -->
<script src="./js/bootstrap.bundle.min.js"></script>
<script>
    // Function to include external HTML files using fetch and innerHTML
    function includeHTML(file, containerId) {
        fetch(file)
            .then(response => response.text())
            .then(data => {
                document.getElementById(containerId).innerHTML = data;
            });
    }

    // Include the navbar content
    includeHTML('./navbar.html', 'navbar-container');

    // Include the footer content
    includeHTML('./footer.html', 'footer-container');
</script>
</body>

</html>
