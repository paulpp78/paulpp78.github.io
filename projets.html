<!-- projets.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Link to Bootstrap CSS (local) -->
    <link href="./css/bootstrap.min.css" rel="stylesheet">

    <!-- Include your head section here (e.g., meta tags, title, stylesheets, etc.) -->
</head>

<body>
<!-- Include a container for the navbar content -->
<div id="navbar-container"></div>

<main class="container">
    <!-- Content for your projects and skills page goes here -->
    <h1>Projets et Compétences</h1>
    <p>Cette page présente mes projets et compétences.</p>

    <!-- Container for displaying projects -->
    <div id="projects-container"></div>
</main>

<!-- Include a container for the footer content -->
<div id="footer-container"></div>

<!-- Link to Bootstrap JavaScript (local) -->
<script src="./js/bootstrap.bundle.min.js"></script>
<script>
    // Function to include external HTML files using fetch and innerHTML
    function includeHTML(file, containerId) {
        fetch(file)
            .then(response => response.text())
            .then(data => {
                document.getElementById(containerId).innerHTML = data;
            });
    }

    // Include the navbar content
    includeHTML('./navbar.html', 'navbar-container');

    // Include the footer content
    includeHTML('./footer.html', 'footer-container');

    // Fetch and display your GitHub projects
    const username = 'paulpp78'; // Replace with your GitHub username

    fetch(`https://api.github.com/users/${username}/repos?sort=updated`)
        .then(response => response.json())
        .then(data => {
            const projectsContainer = document.getElementById('projects-container');
            data.forEach(project => {
                const projectElement = document.createElement('div');
                projectElement.innerHTML = `
                        <h2>${project.name}</h2>
                        <p>${project.description}</p>
                        <p>Language: ${project.language}</p>
                        <a href="${project.html_url}" target="_blank" rel="noopener noreferrer">Voir sur GitHub</a>
                        <hr>
                    `;
                projectsContainer.appendChild(projectElement);
            });
        })
        .catch(error => console.error('Erreur lors de la récupération des projets :', error));
</script>
</body>

</html>
